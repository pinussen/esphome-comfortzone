substitutions:
  # GPIO pin on ESP32 board connected to DI pin on RS485 module
  tx_pin: "17"

  # GPIO pin on ESP32 board connected to RO pin on RS485 module
  rx_pin: "16"

  # GPIO pin on ESP32 board connected to both DE and RE pins on RS485 module
  re_de_pin: "21"

  api_key: !secret api_key

  comfortzone_protocol_version: "170"

  device_name: "Comfortzone_"
  
  # git branch to use for the source code, can be changed during development
  git_branch: "main"
  git_commit_hash: "bb5fd3ca5d138922357528879ee6ab00f6184e73"

# Using the local `components/comfortzone` instead of fetching the remote package
#packages:
#  comfortzone_package: github://pinussen/esphome-comfortzone/comfortzone-package.yaml@${git_branch}
#  #comfortzone_package: github://pinussen/esphome-comfortzone/comfortzone-package.yaml@${git_commit_hash}
#  #refresh: 1d

esphome:
  name: comfortzone
  platformio_options:
    build_flags:
      - -DUSE_API_USER_DEFINED_ACTIONS

esp32:
  # Your board type, choose correct one from:
  # https://docs.platformio.org/en/latest/boards/index.html
  board: wemos_d1_mini32
  framework:
    type: arduino
  # Depending on your board type, you may need more parameters, e.g.
  # for ESP32-S3 and -C3 based boards, you may need to add:
  #   platformio_options:
  #     board_build.flash_mode: dio

logger:
  # Recommended to keep logging disabled (NONE) for performance reasons.
  # Enable if required for debugging (DEBUG, INFO, ERROR levels).
  level: DEBUG

api:
  encryption:
    key: !secret api_key
  # custom_services is not a valid top-level option in newer esphome versions
  # Services are registered from the C++ component; no YAML option needed here
  
ota:
  platform: esphome
  password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
#  power_save_mode: none

#   To have a "next url" for improv serial
#web_server:

esp32_ble_tracker:
  scan_parameters:
    interval: 1100ms
    window: 1100ms
    active: true
    continuous: true

#bluetooth_proxy:     
#   active: true              

sensor:
  - platform: inkbird_ibsth1_mini
    mac_address: 49:22:01:23:02:BD
    temperature:
      name: "Inkbird Växthus Temperature"
      filters:
        - throttle: 60s
    humidity:
      name: "Inkbird Växthus Humidity"
      filters:
        - throttle: 60s
    battery_level:
      name: "Inkbird Växthus Battery Level"
      filters:
        - throttle: 60s
  - platform: inkbird_ibsth1_mini
    mac_address: 49:22:01:23:09:4D
    temperature:
      name: "Inkbird övervåning Temperature"
      filters:
        - throttle: 60s
    humidity:
      name: "Inkbird övervåning Humidity"
      filters:
        - throttle: 60s
    battery_level:
      name: "Inkbird övervåning Battery Level"
      filters:
        - throttle: 60s
  - platform: inkbird_ibsth1_mini
    mac_address: 49:22:01:23:07:BA
    temperature:
      name: "Inkbird utomhus Temperature"
      filters:
        - throttle: 60s
    humidity:
      name: "Inkbird utomhus Humidity"
      filters:
        - throttle: 60s
    battery_level:
      name: "Inkbird utomhus Battery Level"
      filters:
        - throttle: 60s
